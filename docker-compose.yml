services:
  postgres:
    image: postgres:16-alpine
    container_name: atelier-meridian-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: atelier_meridian
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - atelier-meridian-postgres:/var/lib/postgresql/data

volumes:
  atelier-meridian-postgres:
